# Sibling files live under .github/workflows/ in both wk and recipe-lint.
# Vars TOOL_NAME and TOOL_REPO to match each repo (see env block below).
# Required secret: TAP_GITHUB_TOKEN — a PAT with write access to homebrew-tap and scoop-bucket repos.

name: Update Homebrew & Scoop on release

on:
  workflow_run:
    workflows: [release]
    types: [completed]
  workflow_dispatch:
    inputs:
      tag:
        description: "Release tag to update from (e.g. v1.0.0-rc6)"
        required: true

env:
  # For wk:
  TOOL_NAME: wk
  TOOL_REPO: workato-devs/wk

jobs:
  update-package-managers:
    if: >-
      github.event_name == 'workflow_dispatch' ||
      github.event.workflow_run.conclusion == 'success'
    runs-on: ubuntu-latest
    steps:
      - name: Get release info
        id: release
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            TAG="${{ inputs.tag }}"
          else
            TAG="${{ github.event.workflow_run.head_branch }}"
          fi
          VERSION="${TAG#v}"
          echo "version=$VERSION" >> "$GITHUB_OUTPUT"
          echo "tag=$TAG" >> "$GITHUB_OUTPUT"

      - name: Resolve release checksums
        id: checksums
        run: |
          set -euo pipefail
          BASE="https://github.com/${{ env.TOOL_REPO }}/releases/download/${{ steps.release.outputs.tag }}"
          TOOL="${{ env.TOOL_NAME }}"
          VERSION="${{ steps.release.outputs.version }}"

          declare -A FILES=(
            [darwin_arm64]="${TOOL}_${VERSION}_Darwin_arm64.tar.gz"
            [darwin_amd64]="${TOOL}_${VERSION}_Darwin_x86_64.tar.gz"
            [linux_arm64]="${TOOL}_${VERSION}_Linux_arm64.tar.gz"
            [linux_amd64]="${TOOL}_${VERSION}_Linux_x86_64.tar.gz"
            [windows_amd64]="${TOOL}_${VERSION}_Windows_x86_64.zip"
            [windows_arm64]="${TOOL}_${VERSION}_Windows_arm64.zip"
          )

          # Read SHAs from goreleaser's authoritative checksums.txt instead of
          # re-downloading and re-hashing each asset. This job is triggered the
          # instant the release workflow reports success, which can be BEFORE the
          # assets finish propagating. Previously `curl -sL` (no --fail) saved the
          # 404 "Not Found" body and we hashed that, baking an identical bogus
          # sha256 into every platform. Poll until checksums.txt exists and lists
          # every expected asset, then fail loudly if anything is still missing.
          for attempt in $(seq 1 20); do
            if curl -fsSL -o checksums.txt "$BASE/checksums.txt"; then
              ready=1
              for key in "${!FILES[@]}"; do
                awk -v f="${FILES[$key]}" '$2==f{found=1} END{exit !found}' checksums.txt || ready=0
              done
              [ "$ready" = 1 ] && break
            fi
            echo "checksums.txt not ready yet (attempt ${attempt}/20); waiting 15s..."
            sleep 15
          done

          for key in "${!FILES[@]}"; do
            file="${FILES[$key]}"
            sha=$(awk -v f="$file" '$2==f{print $1}' checksums.txt)
            if ! printf '%s' "$sha" | grep -Eq '^[0-9a-f]{64}$'; then
              echo "::error::No valid sha256 for ${file} in checksums.txt (got: '${sha}'). Aborting before any commit to avoid clobbering the formula with a bad checksum."
              exit 1
            fi
            echo "${key}_sha=$sha" >> "$GITHUB_OUTPUT"
          done

      - name: Update Homebrew formula
        env:
          GH_TOKEN: ${{ secrets.TAP_GITHUB_TOKEN }}
        run: |
          git clone "https://x-access-token:${GH_TOKEN}@github.com/workato-devs/homebrew-tap.git"
          cd homebrew-tap

          FORMULA="Formula/${{ env.TOOL_NAME }}.rb"
          VERSION="${{ steps.release.outputs.version }}"

          sed -i "s/version \".*\"/version \"$VERSION\"/" "$FORMULA"

          update_sha() {
            local marker="$1" sha="$2"
            # Find the platform/arch block and update the sha256 on the next occurrence
            python3 -c "
          import re, sys
          with open('$FORMULA') as f: content = f.read()
          parts = content.split('$marker', 1)
          if len(parts) == 2:
              before_sha = parts[1].split('sha256', 1)
              if len(before_sha) == 2:
                  rest = before_sha[1].split('\n', 1)
                  parts[1] = before_sha[0] + 'sha256 \"$sha\"' + '\n' + rest[1] if len(rest) == 2 else before_sha[0] + 'sha256 \"$sha\"'
                  content = '$marker'.join(parts)
          with open('$FORMULA', 'w') as f: f.write(content)
          "
          }

          update_sha 'Darwin_arm64' "${{ steps.checksums.outputs.darwin_arm64_sha }}"
          update_sha 'Darwin_x86_64' "${{ steps.checksums.outputs.darwin_amd64_sha }}"
          update_sha 'Linux_arm64' "${{ steps.checksums.outputs.linux_arm64_sha }}"
          update_sha 'Linux_x86_64' "${{ steps.checksums.outputs.linux_amd64_sha }}"

          # Guard: update_sha edits in place and silently no-ops if a marker
          # moves. Confirm every resolved sha actually landed in the formula and
          # no PLACEHOLDER survived before we commit.
          if grep -q 'PLACEHOLDER' "$FORMULA"; then
            echo "::error::$FORMULA still contains PLACEHOLDER after update."; exit 1
          fi
          for sha in \
            "${{ steps.checksums.outputs.darwin_arm64_sha }}" \
            "${{ steps.checksums.outputs.darwin_amd64_sha }}" \
            "${{ steps.checksums.outputs.linux_arm64_sha }}" \
            "${{ steps.checksums.outputs.linux_amd64_sha }}"; do
            grep -q "$sha" "$FORMULA" || { echo "::error::Expected sha $sha not written to $FORMULA."; exit 1; }
          done

          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add "$FORMULA"
          git diff --cached --quiet && echo "No Homebrew changes" || { git commit -m "Update ${{ env.TOOL_NAME }} to $VERSION" && git push; }

      - name: Update Scoop manifest
        env:
          GH_TOKEN: ${{ secrets.TAP_GITHUB_TOKEN }}
        run: |
          git clone "https://x-access-token:${GH_TOKEN}@github.com/workato-devs/scoop-bucket.git"
          cd scoop-bucket

          MANIFEST="bucket/${{ env.TOOL_NAME }}.json"
          VERSION="${{ steps.release.outputs.version }}"
          TAG="${{ steps.release.outputs.tag }}"
          TOOL="${{ env.TOOL_NAME }}"
          REPO="${{ env.TOOL_REPO }}"

          python3 -c "
          import json
          with open('$MANIFEST') as f: m = json.load(f)
          m['version'] = '$VERSION'
          m['architecture']['64bit']['url'] = 'https://github.com/$REPO/releases/download/$TAG/${TOOL}_${VERSION}_Windows_x86_64.zip'
          m['architecture']['64bit']['hash'] = '${{ steps.checksums.outputs.windows_amd64_sha }}'
          m['architecture']['arm64']['url'] = 'https://github.com/$REPO/releases/download/$TAG/${TOOL}_${VERSION}_Windows_arm64.zip'
          m['architecture']['arm64']['hash'] = '${{ steps.checksums.outputs.windows_arm64_sha }}'
          with open('$MANIFEST', 'w') as f: json.dump(m, f, indent=2)
          "

          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add "$MANIFEST"
          git diff --cached --quiet && echo "No Scoop changes" || { git commit -m "Update ${{ env.TOOL_NAME }} to $VERSION" && git push; }
